services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockwiki
      POSTGRES_USER: stockwiki
      POSTGRES_PASSWORD: stockwiki
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.19.3
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"

  temporal:
    image: temporalio/auto-setup:1.27.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: stockwiki
      POSTGRES_PWD: stockwiki
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/docker.yaml
    depends_on:
      - postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.37.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    ports:
      - "8233:8080"

  mediawiki-db:
    image: mariadb:11.7
    environment:
      MARIADB_DATABASE: mediawiki
      MARIADB_USER: mediawiki
      MARIADB_PASSWORD: mediawiki
      MARIADB_ROOT_PASSWORD: mediawiki
    ports:
      - "3306:3306"

  mediawiki:
    image: mediawiki:1.43
    depends_on:
      - mediawiki-db
    ports:
      - "8081:80"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: stockwiki
      MINIO_ROOT_PASSWORD: stockwiki123
    ports:
      - "9000:9000"
      - "9001:9001"
